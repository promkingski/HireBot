<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Document Analyzer{% endblock %} — GCP Agentic Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">CB // GCP</span>
    <a href="/" class="{% if active == 'home' %}active{% endif %}">Home</a>
    <a href="/architecture" class="{% if active == 'architecture' %}active{% endif %}">Architecture</a>
    <a href="/analyzer" class="{% if active == 'analyzer' %}active{% endif %}">Analyzer</a>
    <a href="/chat" class="{% if active == 'chat' %}active{% endif %}">Ask Me Anything</a>
    <span class="nav-spacer"></span>
    <a href="/admin" class="admin-link">Admin</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
